name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Go test & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  web-test:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web

  build:
    name: Build (host + openbsd/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build
      - run: make build-openbsd
      - uses: actions/upload-artifact@v5
        with:
          name: weft-openbsd-amd64
          path: weft.openbsd-amd64
