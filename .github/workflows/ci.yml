name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Go test & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  build:
    name: Build (host + openbsd/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build
      - run: make build-openbsd
      - uses: actions/upload-artifact@v4
        with:
          name: weft-openbsd-amd64
          path: weft.openbsd-amd64
